<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>MKS Full İnteraktif Soru Bankası</title>
<style>
:root{--bg:#07111f;--card:#101827;--card2:#0b1220;--text:#eef2ff;--muted:#9ca3af;--line:rgba(148,163,184,.28);--accent:#38bdf8;--good:#22c55e;--bad:#ef4444;--warn:#f59e0b}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(135deg,#07111f,#111827 55%,#0f172a);color:var(--text);min-height:100dvh}.wrap{max-width:1150px;margin:0 auto;padding:14px 14px 100px}.top{position:sticky;top:0;z-index:10;background:rgba(7,17,31,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);padding:12px 0}.brand{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.brand h1{font-size:22px;margin:0;letter-spacing:-.03em}.brand p{margin:4px 0 0;color:var(--muted);font-size:13px}.card{background:rgba(16,24,39,.96);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 16px 40px rgba(0,0,0,.25);margin-top:12px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(235px,1fr));gap:10px}.btn{border:0;border-radius:12px;padding:11px 14px;cursor:pointer;background:var(--accent);color:#06131f;font-weight:850;font-size:15px}.btn.secondary{background:#334155;color:var(--text);border:1px solid var(--line)}.btn.dark{background:var(--card2);color:var(--text);border:1px solid var(--line)}.pill{display:inline-block;padding:5px 8px;border-radius:999px;background:#1e293b;color:var(--muted);font-size:12px;font-weight:750;margin:2px}.muted{color:var(--muted)}.screen{display:none}.screen.active{display:block}.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}.stat{background:var(--card2);border:1px solid var(--line);border-radius:15px;padding:13px}.stat b{font-size:27px}.stat span{display:block;color:var(--muted);font-size:12px;margin-top:4px}.tile{background:linear-gradient(180deg,#101827,#0c1424);border:1px solid var(--line);border-radius:16px;padding:15px;cursor:pointer;text-align:left;color:var(--text)}.tile:hover{border-color:var(--accent)}.tile strong{display:block;font-size:17px;margin-bottom:6px}.search{width:100%;height:48px;background:var(--card2);border:1px solid var(--line);border-radius:14px;color:var(--text);font-size:16px;padding:0 14px;margin:10px 0}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.quizTop{position:sticky;top:0;z-index:12;background:rgba(7,17,31,.95);backdrop-filter:blur(16px);padding:10px 0;border-bottom:1px solid var(--line)}.progress{height:10px;background:#1f2937;border-radius:999px;overflow:hidden;flex:1}.bar{height:100%;background:var(--accent);width:0}.qtext{font-size:21px;line-height:1.45;font-weight:750;margin:14px 0}.opt{width:100%;display:block;text-align:left;margin:9px 0;padding:13px 14px;background:var(--card2);border:1px solid var(--line);border-radius:14px;color:var(--text);font-size:15.5px;cursor:pointer}.opt:hover{border-color:var(--accent)}.opt.selected{border-color:var(--accent);background:#0c2635}.opt.correct{border-color:var(--good);background:#0c2b1a}.opt.wrong{border-color:var(--bad);background:#2b1114}.letter{font-weight:900;margin-right:8px}.navgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}.jump{border:1px solid var(--line);background:var(--card2);color:var(--muted);border-radius:9px;padding:7px 0;font-size:12px;cursor:pointer}.jump.answered{background:#082f49;color:#e0f2fe;border-color:#0ea5e9}.jump.current{outline:2px solid var(--warn)}.jump.good{background:#14532d;color:#dcfce7}.jump.bad{background:#7f1d1d;color:#fee2e2}.bottom{position:fixed;left:0;right:0;bottom:0;background:rgba(7,17,31,.96);border-top:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom));z-index:20}.bottomInner{max-width:1150px;margin:auto;display:flex;justify-content:flex-end;gap:8px}.resultBig{font-size:44px;font-weight:950;margin:4px 0}.reviewItem{border-top:1px solid var(--line);padding:12px 0}.goodText{color:var(--good);font-weight:900}.badText{color:var(--bad);font-weight:900}.two{display:grid;grid-template-columns:1.35fr .65fr;gap:12px}.small{font-size:13px;color:var(--muted);line-height:1.45}.toggle{display:flex;gap:8px;align-items:center}.toggle input{width:18px;height:18px}@media(max-width:780px){.two{grid-template-columns:1fr}.navgrid{grid-template-columns:repeat(5,1fr)}.brand{display:block}.brand .row{margin-top:8px}.qtext{font-size:19px}.statgrid{grid-template-columns:repeat(2,1fr)}.bottomInner .btn{flex:1;padding-left:8px;padding-right:8px}}
</style></head><body><div class="wrap"><div class="top"><div class="brand"><div><h1>MKS Full İnteraktif Soru Bankası</h1><p id="subtitle">Yüklenen denemeler + tüm soru havuzu • telefon uyumlu • GitHub Pages hazır</p></div><div class="row"><button class="btn" onclick="startRandom(50)">Karma 50</button><button class="btn secondary" onclick="startRandom(100)">Karma 100</button></div></div></div>
<section id="home" class="screen active"><div class="statgrid"><div class="stat"><b id="totalCount">0</b><span>Toplam soru</span></div><div class="stat"><b id="testCount">0</b><span>Test / bölüm</span></div><div class="stat"><b id="wrongCount">0</b><span>Yanlışlarım</span></div><div class="stat"><b id="doneCount">0</b><span>Çözülen</span></div></div><div class="card"><div class="row"><span class="pill">Deneme Bölümü</span><span class="pill">Test test ayrıldı</span><span class="pill">Yanlışlarım</span><span class="pill">Arama</span><span class="pill">Şık karıştırma</span></div><input class="search" id="homeSearch" placeholder="Deneme, konu, kaynak ara..." oninput="renderHome()"><div id="homeGrid" class="grid"></div></div></section>
<section id="list" class="screen"><div class="row"><button class="btn secondary" onclick="show('home')">← Ana sayfa</button><h2 id="listTitle" style="margin:0"></h2></div><input class="search" id="listSearch" placeholder="Bu bölümde ara..." oninput="renderList()"><div id="listGrid" class="grid"></div></section>
<section id="quiz" class="screen"><div class="quizTop"><div class="row"><div class="progress"><div class="bar" id="bar"></div></div><b id="counter">1/50</b><span class="pill" id="scoreMini">✓0 ✕0</span></div></div><div class="two"><main><div class="small" id="qmeta"></div><div class="qtext"><span id="qno"></span> <span id="qtxt"></span></div><div id="opts"></div></main><aside class="card"><div class="row" style="justify-content:space-between"><b>Soru haritası</b><span class="small" id="mapInfo"></span></div><div id="map" class="navgrid" style="margin-top:10px"></div></aside></div></section>
<section id="result" class="screen"><div class="card"><h2 style="margin:0">Sonuç</h2><div class="resultBig" id="resultBig">0/0</div><p class="muted" id="resultText"></p><div class="row"><button class="btn" onclick="restartQuiz()">Tekrar çöz</button><button class="btn secondary" onclick="show('home')">Ana sayfa</button><button class="btn dark" onclick="copyResult()">Sonucu kopyala</button></div></div><div id="review" class="card"></div></section>
</div><div class="bottom" id="bottom" style="display:none"><div class="bottomInner"><button class="btn secondary" onclick="prevQ()">Önceki</button><button class="btn dark" onclick="finishQuiz()">Bitir</button><button class="btn" onclick="nextQ()">Sonraki</button></div></div><script src="data.js"></script><script>
const letters=['A','B','C','D','E']; let bank=window.QUESTION_DATA||[]; let currentGroup=null; let currentList=[]; let qidx=0; let answers=[]; let optionOrders=[]; let quizTitle='';
const store={get k(){return JSON.parse(localStorage.getItem('mksFullStats')||'{}')}, set(v){localStorage.setItem('mksFullStats',JSON.stringify(v))}};
function norm(s){return (s||'').toLocaleLowerCase('tr-TR')}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');document.getElementById('bottom').style.display=id==='quiz'?'block':'none'; if(id==='home') renderHome();}
function stat(){let s=store.k; let wrong=Object.values(s).filter(x=>x&&x.last===false).length; let done=Object.keys(s).length; document.getElementById('totalCount').textContent=bank.length; document.getElementById('wrongCount').textContent=wrong; document.getElementById('doneCount').textContent=done;}
function groups(){let bySource={}; bank.forEach(q=>{let k=q.source||'Kaynak'; if(!bySource[k]) bySource[k]=[]; bySource[k].push(q)}); return bySource;}
function renderHome(){stat(); let g=groups(); let search=norm(document.getElementById('homeSearch').value); let grid=document.getElementById('homeGrid'); grid.innerHTML=''; let tiles=[];
 tiles.push({title:'Deneme Bölümü',sub:'Yüklediğin Word denemeleri test test ayrıldı',type:'source',key:'Yüklenen Word Denemeleri',count:(g['Yüklenen Word Denemeleri']||[]).length});
 tiles.push({title:'MKS Tüm Sorular Havuzu',sub:'Büyük soru bankası / konu başlıkları / toplu çalışma',type:'source',key:'MKS Tüm Sorular Havuzu',count:(g['MKS Tüm Sorular Havuzu']||[]).length});
 tiles.push({title:'Yanlışlarım',sub:'Son çözümlerde yanlış yaptığın sorular',type:'wrongs',key:'wrongs',count:Object.values(store.k).filter(x=>x&&x.last===false).length});
 tiles.push({title:'Karma Denemeler',sub:'Tüm havuzdan seçmeli 50 / 100 / 150',type:'randoms',key:'randoms',count:bank.length});
 Object.keys(g).filter(k=>!['Yüklenen Word Denemeleri','MKS Tüm Sorular Havuzu'].includes(k)).forEach(k=>tiles.push({title:k,sub:'Kaynak bölümü',type:'source',key:k,count:g[k].length}));
 tiles=tiles.filter(t=>!search||norm(t.title+' '+t.sub).includes(search)); document.getElementById('testCount').textContent=tiles.length;
 tiles.forEach(t=>{let div=document.createElement('button'); div.className='tile'; div.innerHTML=`<strong>${t.title}</strong><div class="small">${t.sub}</div><div><span class="pill">${t.count} soru</span></div>`; div.onclick=()=>openGroup(t); grid.appendChild(div);});}
function openGroup(t){currentGroup=t; document.getElementById('listTitle').textContent=t.title; document.getElementById('listSearch').value=''; show('list'); renderList();}
function renderList(){let grid=document.getElementById('listGrid'); grid.innerHTML=''; let search=norm(document.getElementById('listSearch').value); let items=[];
 if(currentGroup.type==='wrongs'){let s=store.k; let ids=Object.keys(s).filter(id=>s[id]&&s[id].last===false); let arr=bank.filter(q=>ids.includes(q.id)); items.push({title:'Yanlışlarım - tamamı',sub:'Yanlış yaptığın sorular',questions:arr});}
 else if(currentGroup.type==='randoms'){[50,100,150].forEach(n=>items.push({title:`Karma ${n} Soru`,sub:'Tüm havuzdan rastgele',random:n,questions:bank}));}
 else {let arr=bank.filter(q=>(q.source||'')===currentGroup.key); let byTest={}; arr.forEach(q=>{let k=q.test||q.topic||'Genel'; if(!byTest[k]) byTest[k]=[]; byTest[k].push(q)}); Object.keys(byTest).sort((a,b)=>a.localeCompare(b,'tr')).forEach(k=>items.push({title:k,sub:currentGroup.title,questions:byTest[k]})); if(arr.length>0){items.unshift({title:currentGroup.title+' - Tamamı',sub:'Bu kaynaktaki tüm sorular',questions:arr}); for(let i=0;i<arr.length;i+=50){items.push({title:`${currentGroup.title} - Test ${Math.floor(i/50)+1}`,sub:`${i+1}-${Math.min(i+50,arr.length)} arası`,questions:arr.slice(i,i+50)});} }}
 items=items.filter(it=>!search||norm(it.title+' '+it.sub).includes(search)); items.forEach(it=>{let d=document.createElement('button'); d.className='tile'; d.innerHTML=`<strong>${it.title}</strong><div class="small">${it.sub}</div><div><span class="pill">${it.random||it.questions.length} soru</span></div>`; d.onclick=()=>{ if(it.random) startQuiz(shuffle([...it.questions]).slice(0,it.random),it.title,true); else startQuiz(it.questions,it.title,false); }; grid.appendChild(d);});}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a;}
function startRandom(n){startQuiz(shuffle([...bank]).slice(0,n),`Karma ${n} Soru`,true)}
function startQuiz(list,title,shuffleOpts){currentList=list.filter(q=>q&&q.options&&q.options.length===5); quizTitle=title; answers=Array(currentList.length).fill(null); qidx=0; optionOrders=currentList.map(q=>{let ord=[0,1,2,3,4]; return shuffleOpts && !q.keepOrder ? shuffle(ord) : ord}); show('quiz'); renderQ();}
function renderQ(){let q=currentList[qidx], ord=optionOrders[qidx]; document.getElementById('counter').textContent=`${qidx+1}/${currentList.length}`; document.getElementById('bar').style.width=`${((qidx+1)/currentList.length)*100}%`; document.getElementById('qmeta').textContent=`${quizTitle} • ${q.source} • ${q.test||''} ${q.number?('• Soru '+q.number):''}`; document.getElementById('qno').textContent=(qidx+1)+'.'; document.getElementById('qtxt').textContent=q.question; let opts=document.getElementById('opts'); opts.innerHTML=''; let chosen=answers[qidx]; ord.forEach((oi,shown)=>{let b=document.createElement('button'); let cls='opt'; if(chosen!==null){ if(oi===q.answer) cls+=' correct'; else if(chosen===oi) cls+=' wrong'; } else if(chosen===oi) cls+=' selected'; b.className=cls; b.innerHTML=`<span class="letter">${letters[shown]})</span>${q.options[oi]}`; b.onclick=()=>choose(oi); opts.appendChild(b);}); renderMap(); updateMini();}
function choose(oi){if(answers[qidx]!==null) return; answers[qidx]=oi; let q=currentList[qidx]; let s=store.k; s[q.id]={last:oi===q.answer, time:Date.now(), title:quizTitle}; store.set(s); renderQ();}
function renderMap(){let m=document.getElementById('map'); m.innerHTML=''; for(let i=0;i<currentList.length;i++){let b=document.createElement('button'); let cls='jump'; if(i===qidx) cls+=' current'; if(answers[i]!==null){cls+=' answered '+(answers[i]===currentList[i].answer?'good':'bad')} b.className=cls; b.textContent=i+1; b.onclick=()=>{qidx=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}; m.appendChild(b);} document.getElementById('mapInfo').textContent=answers.filter(x=>x!==null).length+'/'+currentList.length;}
function updateMini(){let ok=0,bad=0; answers.forEach((a,i)=>{if(a!==null){if(a===currentList[i].answer)ok++; else bad++;}}); document.getElementById('scoreMini').textContent=`✓${ok} ✕${bad}`;}
function nextQ(){if(qidx<currentList.length-1){qidx++;renderQ();window.scrollTo({top:0,behavior:'smooth'});}else finishQuiz();}
function prevQ(){if(qidx>0){qidx--;renderQ();window.scrollTo({top:0,behavior:'smooth'});}}
function finishQuiz(){let ok=0; answers.forEach((a,i)=>{if(a===currentList[i].answer)ok++;}); show('result'); document.getElementById('resultBig').textContent=`${ok}/${currentList.length}`; document.getElementById('resultText').textContent=`${quizTitle} • Yanlış/boş: ${currentList.length-ok}`; let r=document.getElementById('review'); r.innerHTML='<h3>Yanlışlar ve boşlar</h3>'; let any=false; currentList.forEach((q,i)=>{if(answers[i]!==q.answer){any=true; let ord=optionOrders[i]; let shownCorrect=letters[ord.indexOf(q.answer)]; let shownYour=answers[i]===null?'Boş':letters[ord.indexOf(answers[i])]; let div=document.createElement('div'); div.className='reviewItem'; div.innerHTML=`<div><span class="pill">Soru ${i+1}</span> <span class="badText">Sen: ${shownYour}</span> <span class="goodText">Doğru: ${shownCorrect}</span></div><p><b>${q.question}</b></p><p class="small">${q.explanation||''}</p><p class="small">Kaynak: ${q.source} / ${q.test||''}</p>`; r.appendChild(div);}}); if(!any) r.innerHTML+='<p class="goodText">Full! Yanlış yok.</p>';}
function restartQuiz(){startQuiz(currentList,quizTitle,false)}
function copyResult(){let ok=0,wr=[]; answers.forEach((a,i)=>{if(a===currentList[i].answer)ok++; else wr.push(i+1)}); let t=`${quizTitle}: ${ok}/${currentList.length}\nYanlış/boş: ${wr.join(', ')||'Yok'}`; navigator.clipboard.writeText(t).then(()=>alert('Sonuç kopyalandı'));}
renderHome(); stat();
</script></body></html>
